<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Book shape -->
  <rect x="50" y="40" width="100" height="120" fill="url(#grad1)" rx="5"/>
  <rect x="55" y="45" width="90" height="110" fill="#fff" rx="3"/>
  
  <!-- Book pages -->
  <line x1="100" y1="50" x2="100" y2="150" stroke="#d97706" stroke-width="2"/>
  <line x1="70" y1="70" x2="130" y2="70" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
  <line x1="70" y1="85" x2="130" y2="85" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
  <line x1="70" y1="100" x2="130" y2="100" stroke="#f59e0b" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Hexagon (Hive) -->
  <polygon points="100,20 115,28 115,44 100,52 85,44 85,28" fill="#d97706" opacity="0.9"/>
  <polygon points="100,24 112,30 112,42 100,48 88,42 88,30" fill="#fbbf24"/>
</svg>
